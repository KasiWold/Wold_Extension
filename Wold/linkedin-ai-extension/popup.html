<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn AI Reply</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      width: 320px;
      background: #0a0a0f;
      color: #e8e8f0;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .header-text p {
      font-size: 11px;
      color: #6b6b80;
      margin-top: 1px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .status-badge.connected {
      background: rgba(34, 197, 94, 0.1);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    .status-badge.disconnected {
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #9494a8;
      margin-bottom: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    input[type="password"], input[type="text"] {
      width: 100%;
      background: #16161f;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #e8e8f0;
      font-family: 'DM Sans', monospace;
      font-size: 12px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #6366f1;
    }

    .input-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .eye-btn {
      background: #16161f;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #6b6b80;
      padding: 10px;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 13px;
      transition: color 0.2s;
    }

    .eye-btn:hover { color: #e8e8f0; }

    .save-btn {
      width: 100%;
      margin-top: 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 10px;
      transition: opacity 0.2s;
    }

    .save-btn:hover { opacity: 0.85; }
    .save-btn:active { opacity: 0.7; }

    .divider {
      border: none;
      border-top: 1px solid #1e1e2e;
      margin: 18px 0;
    }

    .guide {
      font-size: 11.5px;
      color: #6b6b80;
      line-height: 1.6;
    }

    .guide a {
      color: #818cf8;
      text-decoration: none;
    }

    .guide a:hover { text-decoration: underline; }

    .guide ol {
      padding-left: 16px;
      margin-top: 6px;
    }

    .guide ol li { margin-bottom: 4px; }

    .saved-msg {
      font-size: 12px;
      color: #4ade80;
      text-align: center;
      margin-top: 8px;
      height: 16px;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">✦</div>
    <div class="header-text">
      <h1>LinkedIn AI Reply</h1>
      <p>Powered by Claude</p>
    </div>
  </div>

  <div id="statusBadge" class="status-badge disconnected">
    <div class="status-dot"></div>
    <span id="statusText">No API key set</span>
  </div>

  <label for="apiKeyInput">Anthropic API Key</label>
  <div class="input-row">
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off" spellcheck="false" />
    <button class="eye-btn" id="toggleVisibility" title="Show/hide">👁</button>
  </div>

  <button class="save-btn" id="saveBtn">Save Key</button>
  <div class="saved-msg" id="savedMsg"></div>

  <hr class="divider">

  <div class="guide">
    <strong style="color:#9494a8; font-size:11px; text-transform:uppercase; letter-spacing:.05em;">How to get an API key</strong>
    <ol>
      <li>Go to <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></li>
      <li>Sign up / log in</li>
      <li>Click <strong>API Keys</strong> in the left sidebar</li>
      <li>Click <strong>Create Key</strong>, copy it, paste above</li>
    </ol>
    <p style="margin-top:8px">Cost: roughly $0.003 per reply (extremely cheap for personal use).</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
